name: Build iOS App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-14
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'
    
    - name: Show Xcode Version
      run: xcodebuild -version
      
    - name: Cache Swift Packages
      uses: actions/cache@v3
      with:
        path: |
          ~/Library/Developer/Xcode/DerivedData
          .build
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-
    
    - name: Install Dependencies
      run: |
        xcodebuild -resolvePackageDependencies -project AnichinApp.xcodeproj -scheme AnichinApp
    
    - name: Build App
      run: |
        xcodebuild clean build \
          -project AnichinApp.xcodeproj \
          -scheme AnichinApp \
          -configuration Release \
          -destination "generic/platform=iOS" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
    
    - name: Create Archive
      run: |
        xcodebuild archive \
          -project AnichinApp.xcodeproj \
          -scheme AnichinApp \
          -configuration Release \
          -archivePath ./build/AnichinApp.xcarchive \
          -destination "generic/platform=iOS" \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
    
    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath ./build/AnichinApp.xcarchive \
          -exportPath ./build \
          -exportOptionsPlist ExportOptions.plist
    
    - name: Rename IPA
      run: |
        mkdir -p ./output
        find ./build -name "*.ipa" -exec cp {} ./output/AnichinApp.ipa \;
        
    - name: Get Build Info
      id: build_info
      run: |
        IPA_SIZE=$(du -h ./output/AnichinApp.ipa | cut -f1)
        echo "ipa_size=$IPA_SIZE" >> $GITHUB_OUTPUT
        echo "build_date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
        
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AnichinApp-IPA
        path: ./output/AnichinApp.ipa
        retention-days: 30
        
    - name: Create Release
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Anichin iOS v1.0.${{ github.run_number }}
        body: |
          ## 🎉 Anichin iOS Build
          
          **Build Date:** ${{ steps.build_info.outputs.build_date }}
          **IPA Size:** ${{ steps.build_info.outputs.ipa_size }}
          **Commit:** ${{ github.sha }}
          
          ### 📱 Installation
          1. Download IPA from assets below
          2. Install via Scarlet/AltStore/Sideloadly
          3. Trust certificate in Settings
          
          ### ✨ Features
          - Streaming donghua dari Anichin.moe
          - Download untuk offline viewing
          - Bookmark & history tracking
          - Netflix-style UI dengan glassmorphism
          - Multiple streaming servers
          - Push notifications
        files: ./output/AnichinApp.ipa
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '✅ **iOS Build Successful!**\n\nIPA artifact tersedia di Actions tab untuk testing.'
          })
